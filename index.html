<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>deployment.yaml — run me</title>
<meta name="description" content="A tiny interactive DevOps puzzle. Fix the deploy, and something nice happens." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#10131a; --panel:#171b26; --panel-2:#1e2430; --line:#262d3b;
    --ink:#d7dde8; --muted:#7c8698; --faint:#4a5163;
    --accent:#35d0ba; --accent-dim:#1f8f81;
    --pink:#ff7eb6; --pink-soft:#ffd7e8;
    --warn:#f5a742; --danger:#ff5c72;
    --cream:#fff5f7;
    --radius:14px;
    --mono:'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
    --ui:'Space Grotesk', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:
      radial-gradient(1100px 600px at 80% -10%, rgba(53,208,186,.10), transparent 60%),
      radial-gradient(900px 500px at 0% 110%, rgba(255,126,182,.10), transparent 55%),
      var(--bg);
    color:var(--ink); font-family:var(--ui);
    display:flex; align-items:center; justify-content:center;
    padding:28px 18px; min-height:100%;
    -webkit-font-smoothing:antialiased;
  }
  .stage{width:100%; max-width:760px}

  /* eyebrow */
  .eyebrow{
    display:flex; align-items:center; gap:10px;
    font-size:12px; letter-spacing:.18em; text-transform:uppercase;
    color:var(--muted); margin:0 4px 12px;
  }
  .eyebrow .dot{width:7px;height:7px;border-radius:50%;background:var(--accent);
    box-shadow:0 0 0 4px rgba(53,208,186,.14)}
  .eyebrow b{color:var(--ink); font-weight:600; letter-spacing:.02em; text-transform:none; font-size:13px}

  /* window chrome */
  .win{
    background:var(--panel); border:1px solid var(--line);
    border-radius:var(--radius); overflow:hidden;
    box-shadow:0 30px 60px -30px rgba(0,0,0,.7), 0 0 0 1px rgba(255,255,255,.02) inset;
  }
  .titlebar{
    display:flex; align-items:center; gap:12px;
    padding:11px 14px; background:linear-gradient(180deg,#1b202c,#161b25);
    border-bottom:1px solid var(--line);
  }
  .traffic{display:flex; gap:8px}
  .traffic i{width:12px;height:12px;border-radius:50%; display:block}
  .traffic .r{background:#ff5f57} .traffic .y{background:#febc2e} .traffic .g{background:#28c840}
  .tab{
    display:inline-flex; align-items:center; gap:8px;
    font-family:var(--mono); font-size:12.5px; color:var(--ink);
    background:var(--panel-2); border:1px solid var(--line); border-bottom:none;
    padding:6px 12px; border-radius:8px 8px 0 0; margin-bottom:-12px;
  }
  .tab svg{width:13px;height:13px}
  .titlebar .spacer{flex:1}
  .badge{
    font-family:var(--mono); font-size:11px; color:var(--muted);
    border:1px solid var(--line); padding:3px 9px; border-radius:20px;
  }

  /* editor */
  .editor-wrap{position:relative; display:flex; background:var(--panel);
    max-height:44vh; min-height:220px}
  .gutter{
    flex:0 0 auto; padding:16px 10px 16px 16px; text-align:right;
    font-family:var(--mono); font-size:13px; line-height:1.55;
    color:#3d465a; user-select:none; background:var(--panel);
    border-right:1px solid var(--line); white-space:pre; overflow:hidden;
  }
  .code{
    flex:1; border:0; resize:none; outline:none;
    font-family:var(--mono); font-size:13px; line-height:1.55;
    padding:16px 16px 16px 14px; color:var(--ink); background:transparent;
    tab-size:2; white-space:pre; overflow:auto; caret-color:var(--accent);
  }
  .code::selection{background:rgba(53,208,186,.28)}

  /* toolbar */
  .toolbar{
    display:flex; align-items:center; gap:10px; flex-wrap:wrap;
    padding:12px 14px; background:var(--panel-2); border-top:1px solid var(--line);
  }
  button{font-family:var(--ui); cursor:pointer; border:0}
  .run{
    display:inline-flex; align-items:center; gap:9px;
    background:var(--accent); color:#05221e; font-weight:700; font-size:14px;
    padding:10px 18px; border-radius:10px; letter-spacing:.01em;
    box-shadow:0 6px 18px -8px rgba(53,208,186,.8);
    transition:transform .08s ease, box-shadow .2s ease, background .2s;
  }
  .run:hover{background:#41e0c9; box-shadow:0 8px 22px -8px rgba(53,208,186,.9)}
  .run:active{transform:translateY(1px)}
  .run:disabled{opacity:.55; cursor:progress}
  .run svg{width:15px;height:15px}
  .ghost{
    display:inline-flex; align-items:center; gap:8px;
    background:transparent; color:var(--muted); font-weight:500; font-size:13px;
    padding:9px 14px; border-radius:10px; border:1px solid var(--line);
    transition:color .2s, border-color .2s, background .2s;
  }
  .ghost:hover{color:var(--ink); border-color:#3a4358; background:rgba(255,255,255,.02)}
  .ghost svg{width:14px;height:14px}
  .toolbar .spacer{flex:1}
  .status{font-family:var(--mono); font-size:12px; color:var(--muted)}

  /* hint callout */
  .hints{padding:0 14px}
  .hints.on{padding:12px 14px 4px}
  .hint{
    display:flex; gap:11px; align-items:flex-start;
    background:rgba(245,167,66,.08); border:1px solid rgba(245,167,66,.28);
    border-radius:12px; padding:11px 13px; margin-bottom:10px;
    font-size:13.5px; line-height:1.5; color:#f2d9b0;
    animation:slidein .3s ease both;
  }
  .hint .k{flex:0 0 auto; font-family:var(--mono); font-size:11px; color:var(--warn);
    border:1px solid rgba(245,167,66,.4); border-radius:6px; padding:2px 7px; margin-top:1px}
  .hint code{font-family:var(--mono); background:rgba(0,0,0,.35); color:#ffe6c2;
    padding:1px 6px; border-radius:5px; font-size:12.5px}

  /* terminal */
  .term-wrap{padding:0 14px}
  .term-wrap.on{padding:0 14px 14px}
  .term{
    display:none; background:#0c0f15; border:1px solid var(--line); border-radius:12px;
    font-family:var(--mono); font-size:12.5px; line-height:1.6;
    padding:14px 16px; color:#c3cbd8; overflow:auto; max-height:340px;
    white-space:pre-wrap; word-break:break-word;
  }
  .term.on{display:block; animation:slidein .25s ease both}
  .term .cmd{color:#eaeef6}
  .term .cmd::before{content:"$ "; color:var(--accent)}
  .term .ok{color:var(--accent)}
  .term .dim{color:#5f6a7d}
  .term .warn{color:var(--warn)}
  .term .err{color:var(--danger)}
  .term .k{color:#8ab4ff}
  .term .head{color:#9aa4b5}
  .cursor{display:inline-block;width:8px;height:15px;background:var(--accent);
    vertical-align:-2px;animation:blink 1s steps(1) infinite;margin-left:1px}

  @keyframes blink{50%{opacity:0}}
  @keyframes slidein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  .foot{margin:14px 4px 0; font-size:12px; color:var(--muted); text-align:center;
    font-family:var(--mono)}
  .foot span{color:var(--accent-dim)}

  /* ---------- reveal ---------- */
  .reveal{
    position:fixed; inset:0; display:none; align-items:center; justify-content:center;
    padding:20px; z-index:50;
    background:radial-gradient(120% 120% at 50% 0%, rgba(255,126,182,.28), rgba(16,19,26,.86) 60%);
    backdrop-filter:blur(3px);
  }
  .reveal.on{display:flex; animation:fade .35s ease both}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  #confetti{position:fixed; inset:0; pointer-events:none; z-index:49; display:none}
  #confetti.on{display:block}

  .card{
    width:min(420px,100%); background:var(--cream);
    border-radius:20px; overflow:hidden; position:relative;
    box-shadow:0 40px 90px -30px rgba(0,0,0,.6), 0 0 0 4px rgba(255,255,255,.5);
    animation:pop .5s cubic-bezier(.2,1.3,.4,1) both;
  }
  @keyframes pop{from{opacity:0;transform:scale(.85) translateY(14px)}to{opacity:1;transform:none}}
  .card .bar{
    display:flex; align-items:center; gap:9px; padding:9px 13px;
    background:#ffe3ef; border-bottom:1px solid #ffc9df;
    font-family:var(--mono); font-size:12px; color:#c85a8b;
  }
  .card .bar .dots{display:flex;gap:6px}
  .card .bar .dots i{width:10px;height:10px;border-radius:50%;display:block}
  .card .bar .dots .a{background:#ff9ac0}.card .bar .dots .b{background:#ffc36b}.card .bar .dots .c{background:#8fe6a0}
  .card .bar .close{margin-left:auto; color:#c85a8b; background:none; font-size:15px;
    line-height:1; padding:2px 6px; border-radius:6px}
  .card .bar .close:hover{background:#ffd0e2}
  .card .body{padding:24px 26px 28px; text-align:center; color:#5b3a49}
  .kitty{width:170px;height:170px;margin:2px auto 8px;display:block}
  .card h1{
    font-family:var(--ui); font-weight:700; margin:6px 0 2px;
    font-size:30px; color:#e0568f; letter-spacing:-.01em;
  }
  .card .sub{font-size:16px; font-weight:600; color:#7a4a5e; margin:0 0 4px}
  .card .evaaa{color:var(--pink); }
  .card .meta{
    display:inline-block; margin-top:14px; font-family:var(--mono); font-size:11.5px;
    color:#2f8f7f; background:#dff6f0; border:1px solid #bfeade; border-radius:20px;
    padding:5px 12px;
  }
  .card .again{
    margin-top:16px; font-family:var(--ui); font-size:13px; font-weight:600;
    color:#c85a8b; background:#ffe3ef; border:1px solid #ffc9df; border-radius:10px;
    padding:8px 14px;
  }
  .card .again:hover{background:#ffd6e8}

  /* kitty animation */
  .ear-l,.ear-r{transform-origin:center bottom; animation:earwig 3.2s ease-in-out infinite}
  .ear-r{animation-delay:.4s}
  @keyframes earwig{0%,88%,100%{transform:rotate(0)}92%{transform:rotate(-5deg)}96%{transform:rotate(4deg)}}
  .tail{transform-origin:12px 118px; animation:tailwag 2.4s ease-in-out infinite}
  @keyframes tailwag{0%,100%{transform:rotate(-6deg)}50%{transform:rotate(9deg)}}
  .eye{transform-origin:center; animation:blinkeye 4.5s ease-in-out infinite}
  @keyframes blinkeye{0%,94%,100%{transform:scaleY(1)}97%{transform:scaleY(.1)}}

  @media (max-width:560px){
    .card h1{font-size:26px} .kitty{width:150px;height:150px}
    .tab span{display:none}
  }
  @media (prefers-reduced-motion:reduce){
    *{animation-duration:.001ms !important; animation-iteration-count:1 !important}
    #confetti{display:none !important}
  }
</style>
</head>
<body>
  <main class="stage">
    <div class="eyebrow">
      <span class="dot"></span>
      <span>cluster:&nbsp;<b>mega-important-prod</b></span>
    </div>

    <div class="win" role="group" aria-label="Code editor">
      <div class="titlebar">
        <div class="traffic"><i class="r"></i><i class="y"></i><i class="g"></i></div>
        <span class="tab">
          <svg viewBox="0 0 24 24" fill="none" stroke="#35d0ba" stroke-width="2"><path d="M4 6h16M4 12h10M4 18h13"/></svg>
          <span>deployment.yaml</span>
        </span>
        <div class="spacer"></div>
        <span class="badge">read · edit · run</span>
      </div>

      <div class="editor-wrap">
        <div class="gutter" id="gutter" aria-hidden="true">1</div>
        <textarea class="code" id="code" spellcheck="false" autocapitalize="off"
          autocomplete="off" aria-label="deployment.yaml editor"></textarea>
      </div>

      <div class="toolbar">
        <button class="run" id="run">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          Run
        </button>
        <button class="ghost" id="hint">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 18h6M10 21h4M12 3a6 6 0 0 0-4 10.5c.7.8 1 1.3 1 2.5h6c0-1.2.3-1.7 1-2.5A6 6 0 0 0 12 3z"/></svg>
          Need a hint?
        </button>
        <button class="ghost" id="reset" title="Restore original file">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 12a9 9 0 1 0 3-6.7M3 4v4h4"/></svg>
          Reset
        </button>
        <div class="spacer"></div>
        <span class="status" id="status">ready</span>
      </div>

      <div class="hints" id="hints" aria-live="polite"></div>
      <div class="term-wrap" id="termwrap">
        <div class="term" id="term" role="log" aria-live="polite"></div>
      </div>
    </div>

    <p class="foot">hint: <span>real</span> kubernetes yaml · fix the deploy to continue</p>
  </main>

  <canvas id="confetti"></canvas>

  <div class="reveal" id="reveal" role="dialog" aria-modal="true" aria-label="A surprise">
    <div class="card">
      <div class="bar">
        <div class="dots"><i class="a"></i><i class="b"></i><i class="c"></i></div>
        <span>birthday.exe</span>
        <button class="close" id="close" aria-label="Close">✕</button>
      </div>
      <div class="body">
        <!-- original kawaii kitten (not a trademarked character) -->
        <svg class="kitty" viewBox="0 0 200 200" role="img" aria-label="A cute kitten">
          <!-- tail -->
          <path class="tail" d="M18 150 C-6 138 6 108 24 118 C14 128 22 140 34 142 Z" fill="#f3f3f5" stroke="#d9d9e0" stroke-width="2"/>
          <!-- body -->
          <ellipse cx="100" cy="150" rx="52" ry="40" fill="#fdfdff" stroke="#e4e4ec" stroke-width="2"/>
          <!-- ears -->
          <path class="ear-l" d="M56 60 L44 22 L86 46 Z" fill="#fdfdff" stroke="#e4e4ec" stroke-width="2"/>
          <path class="ear-r" d="M144 60 L156 22 L114 46 Z" fill="#fdfdff" stroke="#e4e4ec" stroke-width="2"/>
          <path d="M58 54 L51 33 L74 46 Z" fill="#ffd0e2"/>
          <path d="M142 54 L149 33 L126 46 Z" fill="#ffd0e2"/>
          <!-- head -->
          <ellipse cx="100" cy="92" rx="58" ry="50" fill="#fdfdff" stroke="#e4e4ec" stroke-width="2"/>
          <!-- cheeks -->
          <circle cx="64" cy="104" r="11" fill="#ffdcea"/>
          <circle cx="136" cy="104" r="11" fill="#ffdcea"/>
          <!-- eyes -->
          <ellipse class="eye" cx="80" cy="90" rx="7.5" ry="10" fill="#3a2b33"/>
          <ellipse class="eye" cx="120" cy="90" rx="7.5" ry="10" fill="#3a2b33"/>
          <circle cx="82.5" cy="86" r="2.4" fill="#fff"/>
          <circle cx="122.5" cy="86" r="2.4" fill="#fff"/>
          <!-- nose + smile -->
          <path d="M96 100 h8 l-4 5 Z" fill="#ff9ec4"/>
          <path d="M100 105 q-8 8 -15 3 M100 105 q8 8 15 3" fill="none" stroke="#caa" stroke-width="2" stroke-linecap="round"/>
          <!-- whiskers -->
          <g stroke="#dcdce4" stroke-width="1.6" stroke-linecap="round">
            <path d="M52 92 h-22 M54 100 h-24 M148 92 h22 M146 100 h24"/>
          </g>
          <!-- bow -->
          <g transform="translate(140 52)">
            <path d="M0 0 L-20 -12 L-20 12 Z" fill="#ff7eb6"/>
            <path d="M0 0 L20 -12 L20 12 Z" fill="#ff7eb6"/>
            <circle cx="0" cy="0" r="6" fill="#ff5c9d"/>
          </g>
        </svg>
        <h1>Happy Birthday</h1>
        <p class="sub">to the Sweetest Person <span class="evaaa">Evaaa</span> 💛</p>
        <div class="meta">deployment.apps/birthday-cake · 1/1 Running ✅</div>
        <br />
        <button class="again" id="again">replay the confetti 🎉</button>
      </div>
    </div>
  </div>

<script>
(function(){
  "use strict";
  var yaml = window.jsyaml;

  var ORIGINAL = [
    "apiVersion: apps/v1",
    "kind: Deployment",
    "metadata:",
    "  name: birthday-cake",
    "  labels:",
    "    app: birthday",
    "spec:",
    "  replicas: 1",
    "  selector:",
    "    matchLabels:",
    "      app: birthday",
    "  template:",
    "    metadata:",
    "      labels:",
    "        app: birthday",
    "    spec:",
    "      containers:",
    "        - name: cake",
    "          image: birthday-kitty:latset",
    "          ports:",
    "            - containerPort: 8080"
  ].join("\n");

  var HINTS = [
    "<b>ImagePullBackOff</b> means Kubernetes tried to pull the container image and couldn\u2019t find it. Your cluster is fine \u2014 the image reference is off. Where in the YAML is the image defined?",
    "Look closely at the <code>image:</code> line. The repository name is fine; it\u2019s the <b>tag</b> after the colon that Kubernetes can\u2019t find. Compare it letter\u2011by\u2011letter to a normal tag.",
    "It should read <code>image: birthday-kitty:latest</code>. Fix the tag typo, then hit <b>Run</b> again. \ud83d\ude80"
  ];

  var code   = document.getElementById("code");
  var gutter = document.getElementById("gutter");
  var runBtn = document.getElementById("run");
  var hintBtn= document.getElementById("hint");
  var resetBtn=document.getElementById("reset");
  var hintsEl= document.getElementById("hints");
  var term   = document.getElementById("term");
  var termWrap=document.getElementById("termwrap");
  var status = document.getElementById("status");
  var reveal = document.getElementById("reveal");

  code.value = ORIGINAL;
  var hintsShown = 0;
  var busy = false;

  /* ---- gutter / line numbers ---- */
  function syncGutter(){
    var n = code.value.split("\n").length;
    var s = "";
    for(var i=1;i<=n;i++) s += i + (i<n?"\n":"");
    gutter.textContent = s;
  }
  code.addEventListener("input", syncGutter);
  code.addEventListener("scroll", function(){ gutter.style.transform = "translateY(" + (-code.scrollTop) + "px)"; });
  syncGutter();

  /* tab inserts two spaces */
  code.addEventListener("keydown", function(e){
    if(e.key === "Tab"){
      e.preventDefault();
      var s=code.selectionStart, en=code.selectionEnd;
      code.value = code.value.slice(0,s) + "  " + code.value.slice(en);
      code.selectionStart = code.selectionEnd = s+2;
      syncGutter();
    }
  });

  /* ---- terminal helpers ---- */
  function esc(t){ return String(t).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
  function clearTerm(){ term.innerHTML=""; }
  var pending = [];
  function push(html){ pending.push(html); }
  function flush(cb){
    termWrap.classList.add("on"); term.classList.add("on");
    var i=0;
    (function step(){
      if(i>=pending.length){ pending=[]; term.scrollTop=term.scrollHeight; if(cb) cb(); return; }
      term.insertAdjacentHTML("beforeend", pending[i] + "\n");
      term.scrollTop = term.scrollHeight;
      i++;
      setTimeout(step, 130);
    })();
  }

  /* ---- validate the deployment ---- */
  function validate(src){
    var doc;
    try { doc = yaml.load(src); }
    catch(err){ return { kind:"yaml", msg:(err && (err.reason||err.message)) || "parse error",
                         line:(err && err.mark && (err.mark.line+1)) || null }; }
    if(!doc || typeof doc!=="object") return { kind:"empty" };
    var c = doc.spec && doc.spec.template && doc.spec.template.spec && doc.spec.template.spec.containers;
    if(!Array.isArray(c) || !c.length) return { kind:"nocontainers" };
    var image = (c[0].image==null? "" : String(c[0].image)).trim();
    if(!image) return { kind:"noimage" };
    if(/[a-z0-9._\/-]*kitty:latest$/i.test(image)) return { kind:"success", image:image };
    return { kind:"imagepull", image:image };
  }

  var POD = "birthday-cake-7c9f8d5b4-x2k9p";

  function renderYaml(res){
    clearTerm();
    push('<span class="cmd">kubectl apply -f deployment.yaml</span>');
    push('<span class="err">error: error parsing deployment.yaml: ' + esc(res.msg) +
         (res.line? ' (line ' + res.line + ')':'') + '</span>');
    push('<span class="dim"># the file didn\u2019t parse as valid YAML \u2014 check indentation & spacing.</span>');
    flush();
    status.textContent = "yaml error";
  }
  function renderStructural(kind){
    clearTerm();
    push('<span class="cmd">kubectl apply -f deployment.yaml</span>');
    if(kind==="nocontainers"){
      push('<span class="err">error: validation failed: spec.template.spec.containers: Required value</span>');
      push('<span class="dim"># a Deployment needs at least one container with an image.</span>');
    } else if(kind==="noimage"){
      push('<span class="err">error: validation failed: containers[0].image: Required value</span>');
      push('<span class="dim"># the container has no image to run.</span>');
    } else {
      push('<span class="err">error: could not read a Deployment from deployment.yaml</span>');
    }
    flush();
    status.textContent = "invalid manifest";
  }
  function renderImagePull(image){
    var q = esc(image);
    clearTerm();
    push('<span class="cmd">kubectl apply -f deployment.yaml</span>');
    push('<span class="ok">deployment.apps/birthday-cake created</span>');
    push('');
    push('<span class="cmd">kubectl get pods</span>');
    push('<span class="head">NAME                            READY   STATUS             RESTARTS   AGE</span>');
    push(POD + '   0/1     <span class="err">ImagePullBackOff</span>   0          8s');
    push('');
    push('<span class="cmd">kubectl describe pod ' + POD + '</span>');
    push('<span class="head">Events:</span>');
    push('  <span class="warn">Warning</span>  Failed   6s  kubelet  Failed to pull image "<span class="k">'+q+'</span>":');
    push('           rpc error: code = NotFound \u2014 manifest for <span class="k">'+q+'</span> not found');
    push('  <span class="warn">Warning</span>  Failed   6s  kubelet  Error: <span class="err">ErrImagePull</span>');
    push('  <span class="dim">Normal</span>   BackOff  4s  kubelet  Back-off pulling image "<span class="k">'+q+'</span>"');
    push('  <span class="warn">Warning</span>  Failed   4s  kubelet  Error: <span class="err">ImagePullBackOff</span>');
    flush();
    status.textContent = "ImagePullBackOff";
  }
  function renderSuccess(cb){
    clearTerm();
    push('<span class="cmd">kubectl apply -f deployment.yaml</span>');
    push('<span class="ok">deployment.apps/birthday-cake created</span>');
    push('');
    push('<span class="cmd">kubectl get pods</span>');
    push('<span class="head">NAME                            READY   STATUS    RESTARTS   AGE</span>');
    push(POD + '   1/1     <span class="ok">Running</span>   0          3s');
    push('');
    push('<span class="cmd">kubectl logs ' + POD + '</span>');
    push('<span class="dim">\ud83c\udf82 starting birthday service on :8080</span>');
    push('<span class="dim">\u2728 rendering surprise\u2026 <span class="ok">done</span></span>');
    push('<span class="ok">\u2714 rollout complete \u2014 opening window\u2026</span>');
    flush(cb);
    status.textContent = "Running \u2714";
  }

  function run(){
    if(busy) return;
    busy = true; runBtn.disabled = true;
    status.textContent = "deploying\u2026";
    termWrap.classList.add("on"); term.classList.add("on");
    term.innerHTML = '<span class="cmd">kubectl apply -f deployment.yaml</span>\n<span class="dim">deploying</span><span class="cursor"></span>';
    term.scrollTop = term.scrollHeight;

    setTimeout(function(){
      var res = validate(code.value);
      if(res.kind==="success"){
        renderSuccess(function(){ setTimeout(showReveal, 550); done(); });
      } else if(res.kind==="yaml"){ renderYaml(res); done(); }
      else if(res.kind==="imagepull"){ renderImagePull(res.image); done(); }
      else { renderStructural(res.kind); done(); }
    }, 620);

    function done(){ busy=false; runBtn.disabled=false; }
  }

  /* ---- hints ---- */
  function showHint(){
    if(hintsShown >= HINTS.length){
      hintBtn.textContent = "That\u2019s every hint \ud83d\udc9b";
      return;
    }
    hintsEl.classList.add("on");
    var d = document.createElement("div");
    d.className = "hint";
    d.innerHTML = '<span class="k">hint '+(hintsShown+1)+'</span><div>'+HINTS[hintsShown]+'</div>';
    hintsEl.appendChild(d);
    hintsShown++;
    hintBtn.lastChild.textContent = hintsShown<HINTS.length ? " Another hint?" : " Show me the fix";
    if(hintsShown>=HINTS.length) hintBtn.lastChild.textContent = " (all hints shown)";
  }

  function resetCode(){
    code.value = ORIGINAL; syncGutter();
    term.classList.remove("on"); termWrap.classList.remove("on"); term.innerHTML="";
    hintsEl.classList.remove("on"); hintsEl.innerHTML=""; hintsShown=0;
    hintBtn.lastChild.textContent = " Need a hint?";
    hintBtn.textContent = ""; // rebuild
    hintBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 18h6M10 21h4M12 3a6 6 0 0 0-4 10.5c.7.8 1 1.3 1 2.5h6c0-1.2.3-1.7 1-2.5A6 6 0 0 0 12 3z"/></svg> Need a hint?';
    status.textContent = "ready";
    code.focus();
  }

  runBtn.addEventListener("click", run);
  hintBtn.addEventListener("click", showHint);
  resetBtn.addEventListener("click", resetCode);
  code.addEventListener("keydown", function(e){
    if((e.metaKey||e.ctrlKey) && e.key==="Enter"){ e.preventDefault(); run(); }
  });

  /* ---- reveal + confetti ---- */
  var cv = document.getElementById("confetti");
  var ctx = cv.getContext("2d");
  var parts = [], raf=null;
  function resize(){ cv.width=innerWidth; cv.height=innerHeight; }
  addEventListener("resize", resize); resize();
  var COLORS = ["#ff7eb6","#35d0ba","#f5a742","#ff5c9d","#8fe6a0","#ffd166","#c58bff"];
  function burst(){
    if(matchMedia("(prefers-reduced-motion:reduce)").matches) return;
    cv.classList.add("on");
    for(var i=0;i<160;i++){
      parts.push({
        x:innerWidth/2 + (Math.random()-0.5)*140,
        y:innerHeight*0.32,
        vx:(Math.random()-0.5)*11,
        vy:Math.random()*-13-4,
        g:0.28+Math.random()*0.12,
        s:6+Math.random()*7,
        rot:Math.random()*6.28, vr:(Math.random()-0.5)*0.35,
        c:COLORS[(Math.random()*COLORS.length)|0],
        life:120+Math.random()*40
      });
    }
    if(!raf) tick();
  }
  function tick(){
    ctx.clearRect(0,0,cv.width,cv.height);
    for(var i=parts.length-1;i>=0;i--){
      var p=parts[i];
      p.vy+=p.g; p.x+=p.vx; p.y+=p.vy; p.rot+=p.vr; p.vx*=0.99; p.life--;
      if(p.y>cv.height+40 || p.life<0){ parts.splice(i,1); continue; }
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot); ctx.fillStyle=p.c;
      ctx.fillRect(-p.s/2,-p.s/2,p.s,p.s*0.6); ctx.restore();
    }
    if(parts.length){ raf=requestAnimationFrame(tick); }
    else { raf=null; ctx.clearRect(0,0,cv.width,cv.height); cv.classList.remove("on"); }
  }
  function showReveal(){
    reveal.classList.add("on");
    document.getElementById("close").focus();
    burst();
  }
  function hideReveal(){ reveal.classList.remove("on"); }
  document.getElementById("close").addEventListener("click", hideReveal);
  document.getElementById("again").addEventListener("click", burst);
  reveal.addEventListener("click", function(e){ if(e.target===reveal) hideReveal(); });
  addEventListener("keydown", function(e){ if(e.key==="Escape") hideReveal(); });
})();
</script>
</body>
</html>
